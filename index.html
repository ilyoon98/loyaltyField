<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>으리챗 난투전 — 프로토타입 v0.9.3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&display=swap');
  :root{--bg:#1a1410;--panel:#2a221b;--panel-light:#3a2f25;--ink:#f3e9d8;--muted:#a8967c;--gold:#e8b84b;--red:#d6543f;--green:#6fae6a;--blue:#5b9bd5;--line:#4a3c2e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(circle at 20% 10%,#2c2117 0%,transparent 50%),radial-gradient(circle at 80% 90%,#241a12 0%,transparent 50%),var(--bg);color:var(--ink);font-family:'Gowun Dodum',sans-serif;min-height:100vh;padding:16px;}
  h1,h2,.display{font-family:'Black Han Sans',sans-serif;letter-spacing:.5px}
  .wrap{max-width:880px;margin:0 auto}
  header{text-align:center;padding:12px 0 20px}
  header h1{font-size:2.2rem;color:var(--gold);text-shadow:2px 2px 0 #000}
  header p{color:var(--muted);font-size:.9rem;margin-top:4px}
  .screen{display:none}.screen.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
  .char-card{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:.15s;text-align:center}
  .char-card:hover{border-color:var(--gold);transform:translateY(-3px)}
  .char-card.sel{border-color:var(--gold);background:var(--panel-light);box-shadow:0 0 0 2px var(--gold) inset}
  .char-card .nm{font-family:'Black Han Sans';font-size:1.2rem;color:var(--gold)}
  .char-card .ef{font-size:.95rem;color:var(--muted);margin-top:6px;line-height:1.4}
  .char-img{width:64px;height:64px;border-radius:50%;object-fit:cover;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);background:var(--panel-light)}
  .char-img.placeholder{font-size:2rem}
  .btn{background:var(--gold);color:#1a1410;border:none;padding:12px 28px;border-radius:8px;font-family:'Black Han Sans';font-size:1.1rem;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.1)}.btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.secondary{background:var(--panel-light);color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:var(--red);color:#fff}
  .txt-input{background:var(--panel-light);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 14px;font-family:'Gowun Dodum';font-size:1rem;width:100%;outline:none}
  .txt-input:focus{border-color:var(--gold)}
  .txt-input::placeholder{color:var(--muted)}
  .lobby-box{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .divider{text-align:center;color:var(--muted);font-size:.85rem;margin:4px 0}
  .waiting-player{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .players{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .pl{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:14px;transition:.2s;position:relative}
  .pl.active-turn{border-color:var(--gold);box-shadow:0 0 0 2px var(--gold),0 0 22px rgba(232,184,75,.55)}
  .pl.dead{opacity:.35;filter:grayscale(1)}
  /* 접속 끊김 (5c-1) — dead와 구분: 더 옅게 회색 처리, 라벨 표시 */
  .pl.disconnected{opacity:.5;filter:grayscale(.7)}
  .pl .disc-tag{position:absolute;top:8px;right:8px;background:var(--red);color:#fff;font-size:.62rem;
    padding:2px 6px;border-radius:8px;font-weight:bold;letter-spacing:.3px}
  .waiting-player.disconnected{opacity:.55}
  .pl.targetable{border-color:var(--red);cursor:pointer;box-shadow:0 0 14px rgba(214,84,63,.4)}
  .pl.targetable:hover{transform:translateY(-3px);box-shadow:0 0 22px rgba(214,84,63,.7)}
  /* 큐 재생 중 피격자 강조 */
  .pl.targeted{border-color:var(--red);box-shadow:0 0 12px rgba(214,84,63,.35)}
  .pl .nm{font-family:'Black Han Sans';font-size:1.3rem}
  .pl .you{color:var(--blue)}.pl .ai{color:var(--red)}
  .pl .char-tag{font-size:.75rem;color:var(--muted);margin:2px 0 8px}
  .hpbar{background:#000;border-radius:6px;height:22px;overflow:hidden;position:relative;border:1px solid var(--line)}
  .hpfill{height:100%;transition:width .4s}
  .hptext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold;text-shadow:1px 1px 2px #000}
  .hand-label{font-family:'Black Han Sans';color:var(--gold);margin:10px 0 6px;font-size:1rem}
  .hand{display:flex;gap:8px;flex-wrap:wrap}
  .card{background:var(--panel-light);border:2px solid var(--line);border-radius:8px;padding:8px 10px;min-width:92px;cursor:pointer;transition:.15s;position:relative}
  .card:hover:not(.disabled){border-color:var(--gold);transform:translateY(-4px)}
  .card.disabled{opacity:.35;cursor:not-allowed}
  .card .ci{font-size:1.7rem;text-align:center;line-height:1.1}
  .card .cn{font-family:'Black Han Sans';font-size:.95rem;text-align:center}
  .card .ct{font-size:.7rem;color:var(--muted);margin-top:3px}
  .card .badge{position:absolute;top:-8px;right:-8px;background:var(--gold);color:#000;font-size:.62rem;padding:2px 5px;border-radius:10px;font-weight:bold}
  .tag-ATK{color:var(--red)}.tag-DEF{color:var(--blue)}.tag-HEAL{color:var(--green)}
  .tag-ALL{color:#d98ad9}.tag-REFLECT{color:#e8b84b}.tag-Bounce{color:#e89a4b}
  .log{background:#0e0a07;border:1px solid var(--line);border-radius:8px;padding:12px;height:150px;overflow-y:auto;font-size:.82rem;line-height:1.6;margin-top:14px}
  .log .l-sys{color:var(--muted)}.log .l-hit{color:var(--red)}.log .l-heal{color:var(--green)}
  .log .l-miss{color:var(--muted);font-style:italic}.log .l-block{color:var(--blue)}.log .l-ref{color:var(--gold)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.active{display:flex}
  .modal{background:var(--panel);border:2px solid var(--gold);border-radius:12px;padding:24px;max-width:440px;width:92%}
  .modal h2{color:var(--gold);font-size:1.4rem;margin-bottom:8px}
  .modal p{color:var(--ink);margin-bottom:16px;font-size:.95rem}
  .modal .react-cards{display:flex;flex-direction:column;gap:8px}
  .react-opt{background:var(--panel-light);border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer;transition:.15s;text-align:left}
  .react-opt:hover{border-color:var(--gold)}
  .react-opt.selected{border-color:var(--blue);background:rgba(100,160,255,.15)}
  .def-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
  .def-tab{flex:1;padding:8px 4px;border:1px solid var(--line);border-radius:8px;background:var(--panel-light);color:var(--ink);font-family:'Black Han Sans';font-size:.85rem;cursor:pointer;transition:.15s;white-space:nowrap}
  .def-tab:hover{border-color:var(--gold)}
  .def-tab.active{border-color:var(--gold);color:var(--gold);background:rgba(255,200,50,.1)}
  .def-summary{color:var(--muted);font-size:.82rem;text-align:center;margin:6px 0;font-family:'Gowun Dodum'}
  .def-confirm{width:100%;margin-top:6px;padding:10px;background:var(--gold);color:#111;border:none;border-radius:8px;font-family:'Black Han Sans';font-size:1rem;cursor:pointer;transition:.15s}
  .def-confirm:hover{filter:brightness(1.1)}
  .status{text-align:center;padding:6px;color:var(--muted);font-family:'Black Han Sans';font-size:.95rem;min-height:1.4em}
  /* 3구역 연출 레이어 (기획 12-5 v7) */
  .stage3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;min-height:110px;margin:4px 0 14px;align-items:stretch}
  .stage-zone{min-height:110px;display:flex;align-items:center;justify-content:center;border-radius:12px;
    background:var(--panel);border:2px solid transparent;transition:border-color .2s,opacity .2s}
  .stage-zone:empty{background:transparent;border-color:transparent}
  .stage-zone.zone-atk{border-color:var(--red)}
  .stage-zone.zone-aoe{border-color:#d98ad9}
  .stage-zone.zone-block{border-color:var(--blue)}
  .stage-zone.zone-ref{border-color:var(--gold)}
  .stage-zone.zone-miss{border-color:var(--muted)}
  .stage-zone.zone-dmg{border-color:var(--red)}
  .stage-zone.zone-heal{border-color:var(--green)}
  .zone-inner{font-family:'Black Han Sans';font-size:1.25rem;text-align:center;line-height:1.3;
    padding:10px 14px;animation:stagePop .3s ease;width:100%}
  .zone-inner .s-card{font-size:2rem;display:block;margin-bottom:2px}
  .zone-inner small{font-size:.75rem;color:var(--muted);font-family:'Gowun Dodum';display:block}
  .zone-inner .big-num{font-size:2.4rem}
  .zone-inner.c-atk{color:var(--red)}
  .zone-inner.c-aoe{color:#d98ad9}
  .zone-inner.c-block{color:var(--blue)}
  .zone-inner.c-ref{color:var(--gold)}
  .zone-inner.c-miss{color:var(--muted)}
  .zone-inner.c-heal{color:var(--green)}
  .zone-inner.c-dmg .big-num{color:var(--red)}
  @keyframes stagePop{from{opacity:0;transform:scale(.82) translateY(10px)}to{opacity:1;transform:none}}
  @keyframes zoneFade{to{opacity:0;transform:translateY(-6px)}}
  .zone-fading{animation:zoneFade .25s ease forwards}
  /* HP바 위로 튀는 데미지 숫자 */
  .dmg-float{position:absolute;top:8px;left:50%;font-family:'Black Han Sans';font-size:1.7rem;
    color:var(--red);text-shadow:0 2px 6px #000;pointer-events:none;z-index:5;
    animation:dmgFloat 1s ease forwards}
  .dmg-float.heal-float{color:var(--green)}
  @keyframes dmgFloat{0%{opacity:0;transform:translate(-50%,8px) scale(.6)}
    25%{opacity:1;transform:translate(-50%,-8px) scale(1.1)}
    100%{opacity:0;transform:translate(-50%,-36px) scale(1)}}
  .center{text-align:center;margin-top:18px}
  .winner{text-align:center;padding:40px}
  .winner h2{font-size:2.6rem;color:var(--gold);text-shadow:2px 2px 0 #000}
  .mode-grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .mode-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:28px 32px;cursor:pointer;transition:.2s;text-align:center;min-width:180px}
  .mode-card:hover{border-color:var(--gold);transform:translateY(-4px)}
  .mode-card .mc-icon{font-size:2.4rem;margin-bottom:10px}
  .mode-card .mc-title{font-family:'Black Han Sans';font-size:1.3rem;color:var(--gold)}
  .mode-card .mc-desc{font-size:.82rem;color:var(--muted);margin-top:6px}
  .room-code-big{font-family:'Black Han Sans';font-size:3rem;color:var(--gold);letter-spacing:10px;text-align:center;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
  .room-code-big:hover{border-color:var(--gold)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.two-col{grid-template-columns:1fr}.mode-grid{flex-direction:column;align-items:center}}
  /* 치트 패널 (테스트 전용, 평소 숨김) */
  #cheatBtn{position:fixed;right:14px;bottom:14px;z-index:80;display:none;
    background:#7a3b8f;color:#fff;border:2px solid #b06fc7;border-radius:10px;
    padding:10px 14px;font-family:'Black Han Sans';font-size:.95rem;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  #cheatBtn:hover{filter:brightness(1.15)}
  #cheatPanel{position:fixed;right:14px;bottom:64px;z-index:80;display:none;width:300px;
    background:var(--panel);border:2px solid #b06fc7;border-radius:12px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.6)}
  #cheatPanel h3{font-family:'Black Han Sans';color:#d79bea;font-size:1.05rem;margin-bottom:6px}
  #cheatPanel .cheat-sec{border-top:1px solid var(--line);margin-top:12px;padding-top:12px}
  #cheatPanel label{display:block;font-size:.78rem;color:var(--muted);margin:6px 0 3px}
  #cheatPanel select,#cheatPanel input{width:100%;padding:7px;background:var(--panel-light);
    border:1px solid var(--line);border-radius:6px;color:var(--ink);font-size:.85rem;margin-bottom:4px}
  #cheatPanel .cheat-apply{width:100%;padding:8px;margin-top:6px;background:#7a3b8f;color:#fff;
    border:none;border-radius:7px;font-family:'Black Han Sans';cursor:pointer}
  #cheatPanel .cheat-apply:hover{filter:brightness(1.15)}
  #cheatMsg{font-size:.76rem;color:var(--gold);min-height:1.1em;margin-top:6px;text-align:center}
  /* 손패 직접 반응 바 */
  #reactionBar{display:none;background:var(--panel);border:2px solid var(--red);border-radius:12px;padding:12px;margin:10px 0;animation:stagePop .25s ease}
  #reactionBar.active{display:block}
  #reactionInfo{font-family:'Black Han Sans';color:var(--red);text-align:center;font-size:1.05rem}
  #reactionTimer{color:var(--gold);text-align:center;font-size:.85rem;min-height:1.1em;margin-top:4px;font-family:'Black Han Sans'}
  #reactionSummary{color:var(--muted);text-align:center;font-size:.82rem;margin-top:4px;font-family:'Gowun Dodum'}
  .card.reactable{cursor:pointer;border-color:var(--gold);opacity:1}
  .card.reactable:hover{transform:translateY(-4px);box-shadow:0 0 16px rgba(232,184,75,.6)}
  .card.react-selected{border-color:var(--blue);box-shadow:0 0 14px rgba(100,160,255,.6)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>으리챗 난투전</h1>
    <p id="headerSub">프로토타입 v0.9.3</p>
  </header>

  <!-- 모드 선택 -->
  <section id="screen-start" class="screen active">
    <h2 style="text-align:center;color:var(--ink)">게임 모드를 선택하세요</h2>
    <div class="mode-grid">
      <div class="mode-card" onclick="startLocalMode()">
        <div class="mc-icon">🤖</div>
        <div class="mc-title">로컬 AI 대전</div>
        <div class="mc-desc">나 vs AI 3명<br>혼자서 바로 플레이</div>
      </div>
      <div class="mode-card" id="onlineModeCard" onclick="goOnline()">
        <div class="mc-icon">🌐</div>
        <div class="mc-title">온라인 멀티</div>
        <div class="mc-desc">방 코드로 친구 초대<br>2~4인 실시간 대전</div>
      </div>
    </div>
  </section>

  <!-- 온라인 로비 -->
  <section id="screen-online" class="screen">
    <h2 style="text-align:center;color:var(--ink);margin-bottom:20px">온라인 플레이</h2>
    <div class="lobby-box">
      <input id="playerNameInput" class="txt-input" placeholder="내 닉네임을 입력하세요" maxlength="10">
      <button class="btn" onclick="createRoom()">방 만들기</button>
      <div class="divider">— 또는 기존 방 입장 —</div>
      <input id="roomCodeInput" class="txt-input" placeholder="방 코드 4자리 (예: AB3K)" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;text-align:center" oninput="updateJoinBtn()">
      <button id="joinRoomBtn" class="btn" onclick="joinRoom()" disabled>방 입장</button>
      <div class="center"><button class="btn secondary" onclick="showScreen('start')">← 뒤로</button></div>
      <div id="lobbyError" style="color:var(--red);text-align:center;font-size:.9rem;min-height:1.2em"></div>
    </div>
  </section>

  <!-- 대기실 -->
  <section id="screen-waiting" class="screen">
    <div style="text-align:center;margin-bottom:4px;font-size:.85rem;color:var(--muted)">방 코드 (클릭하면 복사)</div>
    <div id="roomCodeDisplay" class="room-code-big" onclick="copyRoomCode()">—</div>
    <div style="text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:16px">친구에게 이 코드를 알려주세요</div>
    <div class="two-col">
      <div>
        <div class="hand-label">참가 중인 플레이어</div>
        <div id="waitingPlayerList"></div>
      </div>
      <div>
        <div class="hand-label">내 캐릭터 선택</div>
        <div id="onlineCharGrid" class="char-grid" style="grid-template-columns:1fr 1fr;margin:8px 0"></div>
      </div>
    </div>
    <div class="center">
      <button id="onlineStartBtn" class="btn" onclick="startOnlineGame()" style="display:none">게임 시작</button>
      <div id="waitingStatus" style="color:var(--muted);font-size:.9rem;margin-top:10px"></div>
    </div>
  </section>

  <!-- 로컬 캐릭터 선택 -->
  <section id="screen-select" class="screen">
    <h2 style="color:var(--ink);text-align:center">캐릭터를 선택하세요</h2>
    <div id="charGrid" class="char-grid"></div>
    <div class="center"><button id="startBtn" class="btn" disabled>게임 시작</button></div>
  </section>

  <!-- 전투 -->
  <section id="screen-battle" class="screen">
    <div class="status" id="statusBar">—</div>
    <div class="stage3" id="stageBox">
      <div class="stage-zone" id="stageLeft"></div>
      <div class="stage-zone" id="stageCenter"></div>
      <div class="stage-zone" id="stageRight"></div>
    </div>
    <div class="players" id="playersBox"></div>
    <div id="reactionBar">
      <div id="reactionInfo">—</div>
      <div id="reactionTimer"></div>
      <div id="reactionSummary"></div>
      <div class="center" style="margin-top:8px">
        <button id="reactionConfirmBtn" class="btn" onclick="reactionConfirm()" style="display:none">방어 완료</button>
        <button id="reactionTakeBtn" class="btn secondary" onclick="reactionTake()">그냥 맞기</button>
      </div>
    </div>
    <div class="hand-label">내 손패 — 카드를 눌러 사용</div>
    <div class="hand" id="handBox"></div>
    <div class="center" style="margin-top:12px">
      <button id="passBtn" class="btn secondary">패스 (카드 1장 획득)</button>
    </div>
    <div class="log" id="logBox"></div>
  </section>

  <!-- 승리 -->
  <section id="screen-win" class="screen">
    <div class="winner">
      <h2 id="winText">승리!</h2>
      <p style="color:var(--muted);margin:16px 0 24px" id="winSub"></p>
      <button class="btn" onclick="leaveRoomAndReload()">다시 하기</button>
    </div>
  </section>
</div>

<!-- 피격 반응 모달 -->
<div class="overlay" id="reactOverlay">
  <div class="modal">
    <h2>공격받았다!</h2>
    <p id="reactDesc">—</p>
    <div id="reactTimer" style="text-align:center;color:var(--gold);font-family:'Black Han Sans';font-size:.9rem;min-height:1.2em;margin-bottom:6px"></div>
    <div class="react-cards" id="reactCards"></div>
  </div>
</div>

<!-- 치트 패널 (테스트 전용 — Ctrl+Shift+D 또는 제목 5연타로 토글) -->
<button id="cheatBtn" onclick="toggleCheatPanel()">🛠 치트</button>
<div id="cheatPanel">
  <h3>🛠 테스트 치트</h3>
  <div class="cheat-sec">
    <label>내 손패에 카드 추가</label>
    <select id="cheatCardSel"></select>
    <button class="cheat-apply" onclick="cheatAddCard()">손패에 추가</button>
  </div>
  <div class="cheat-sec">
    <label>플레이어 HP 설정</label>
    <select id="cheatPlayerSel"></select>
    <input id="cheatHpInput" type="number" min="0" max="999" placeholder="HP 값">
    <button class="cheat-apply" onclick="cheatSetHp()">HP 적용</button>
  </div>
  <div id="cheatMsg"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
/* =============================================================
   으리챗 난투전 v0.4 — 로컬 AI + 온라인 멀티 (Firebase)
   ============================================================= */

// ── FIREBASE CONFIG ──────────────────────────────────────────
// Firebase 콘솔(console.firebase.google.com) → 프로젝트 만들기
// → Realtime Database 생성(테스트 모드) → 웹앱 추가
// → 아래 값을 자신의 프로젝트 값으로 교체

function drawCard() { return CARD_KEYS[Math.floor(Math.random() * CARD_KEYS.length)]; }
function newHand(n) { return Array.from({ length: n }, drawCard); }
function effProb(key, chr) {
  const d = CARD_DEFS[key]; let p = d.prob;
  if (d.trigger === chr && d.plusType === "ProbabilityUP") p += d.plusValue;
  return Math.min(1, p);
}
function effValue(key, chr) {
  const d = CARD_DEFS[key]; let v = d.value;
  if (d.trigger === chr && d.plusType === "ValueUP") v += d.plusValue;
  return v;
}
function rollHit(p) { return Math.random() < p; }
function toArr(v) { return v ? (Array.isArray(v) ? v : Object.values(v)) : []; }

async function createRoom() {
  const name = document.getElementById('playerNameInput').value.trim();
  if (!name) { setLobbyError('닉네임을 입력하세요'); return; }
  myName = name;
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code;
  for (let t = 0; t < 20; t++) {
    code = Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    const snap = await db.ref('rooms/' + code).once('value');
    if (!snap.exists()) break;
  }
  roomId = code; isHost = true;
  gameMode = 'online';
  saveSession();
  sweepGhostRooms();   // 유령 방 정리(Stage 1): 새 방 만들 때 묘지 청소. fire-and-forget.
  await db.ref('rooms/' + roomId).set({
    host: myUid, phase:'waiting',
    createdAt: firebase.database.ServerValue.TIMESTAMP,   // 신생 방 보호용 age 기준
    players: { [myUid]: { name:myName, characterId:null } }
  });
  listenRoom();
  showScreen('waiting');
}

// ── 유령 방 정리 (Stage 1) ────────────────────────────────────
// 전원 끊김 + 유예 경과한 방을 다음 createRoom 시 청소. 백엔드 없는 클라 전용 그물.
// 삭제는 per-room 트랜잭션으로 최신값 재확인 → rejoin/phase변경 시 abort. 멱등(이미 없으면 no-op).
function isGhostRoom(data, now) {
  if (!data) return false;
  const pres = data.presence || {};
  // 1차 안전판: 한 명이라도 접속 중이면 유령 아님 (혼자 대기 중인 사람 보호)
  if (Object.values(pres).some(p => p && p.connected === true)) return false;
  // 마지막 이탈 시각 = presence.lastSeen 최대값 (없으면 생성시각, 그것도 없으면 0)
  let lastLeft = 0;
  Object.values(pres).forEach(p => { if (p && p.lastSeen > lastLeft) lastLeft = p.lastSeen; });
  if (!lastLeft) lastLeft = data.createdAt || 0;
  const grace = data.phase === 'finished' ? FIN_GRACE : GHOST_GRACE;
  return now - lastLeft >= grace;
}

async function sweepGhostRooms() {
  try {
    const snap = await db.ref('rooms').once('value');
    const all = snap.val() || {};
    const now = Date.now();
    Object.keys(all).forEach(code => {
      if (!isGhostRoom(all[code], now)) return;        // 읽은 시점 1차 필터
      db.ref('rooms/' + code).transaction(data => {     // 삭제는 트랜잭션 재확인
        // null 반환(삭제). Firebase 트랜잭션 첫 호출은 캐시(=null)로 들어오므로 여기서
        // undefined(abort) 내면 서버 실값을 못 보고 중단됨 → null 반환해 통과시키면
        // 서버 실값으로 재실행되어 아래 isGhostRoom 재확인이 제대로 작동. (이미 없으면 no-op)
        if (!data) return null;                         // 멱등 + optimistic-null 패스 통과
        if (!isGhostRoom(data, Date.now())) return;     // 최신값 재확인 → rejoin 등 시 abort(삭제 취소)
        return null;                                    // 조건 충족 → 방 삭제
      });
    });
  } catch (e) { /* 정리는 best-effort — 실패해도 방 생성엔 영향 없음 */ }
}

async function joinRoom() {
  const name = document.getElementById('playerNameInput').value.trim();
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (!name) { setLobbyError('닉네임을 입력하세요'); return; }
  if (code.length !== 4) { setLobbyError('방 코드 4자리를 입력하세요'); return; }
  myName = name;
  const snap = await db.ref('rooms/' + code).once('value');
  if (!snap.exists()) { setLobbyError('방을 찾을 수 없습니다'); return; }
  const data = snap.val();
  if (data.phase !== 'waiting') { setLobbyError('이미 게임이 시작된 방입니다'); return; }
  if (Object.keys(data.players || {}).length >= 4) { setLobbyError('방이 가득 찼습니다 (최대 4명)'); return; }
  roomId = code; isHost = data.host === myUid;
  gameMode = 'online';
  saveSession();
  await db.ref('rooms/' + roomId + '/players/' + myUid).set({ name:myName, characterId:null });
  listenRoom();
  showScreen('waiting');
}
