<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>으리챗 난투전 — 프로토타입 v0.4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&display=swap');
  :root{--bg:#1a1410;--panel:#2a221b;--panel-light:#3a2f25;--ink:#f3e9d8;--muted:#a8967c;--gold:#e8b84b;--red:#d6543f;--green:#6fae6a;--blue:#5b9bd5;--line:#4a3c2e;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(circle at 20% 10%,#2c2117 0%,transparent 50%),radial-gradient(circle at 80% 90%,#241a12 0%,transparent 50%),var(--bg);color:var(--ink);font-family:'Gowun Dodum',sans-serif;min-height:100vh;padding:16px;}
  h1,h2,.display{font-family:'Black Han Sans',sans-serif;letter-spacing:.5px}
  .wrap{max-width:880px;margin:0 auto}
  header{text-align:center;padding:12px 0 20px}
  header h1{font-size:2.2rem;color:var(--gold);text-shadow:2px 2px 0 #000}
  header p{color:var(--muted);font-size:.9rem;margin-top:4px}
  .screen{display:none}.screen.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .char-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin:16px 0}
  .char-card{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;transition:.15s;text-align:center}
  .char-card:hover{border-color:var(--gold);transform:translateY(-3px)}
  .char-card.sel{border-color:var(--gold);background:var(--panel-light);box-shadow:0 0 0 2px var(--gold) inset}
  .char-card .nm{font-family:'Black Han Sans';font-size:1.2rem;color:var(--gold)}
  .char-card .ef{font-size:.78rem;color:var(--muted);margin-top:6px;line-height:1.4}
  .btn{background:var(--gold);color:#1a1410;border:none;padding:12px 28px;border-radius:8px;font-family:'Black Han Sans';font-size:1.1rem;cursor:pointer;transition:.15s}
  .btn:hover{filter:brightness(1.1)}.btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.secondary{background:var(--panel-light);color:var(--ink);border:1px solid var(--line)}
  .btn.danger{background:var(--red);color:#fff}
  .txt-input{background:var(--panel-light);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:10px 14px;font-family:'Gowun Dodum';font-size:1rem;width:100%;outline:none}
  .txt-input:focus{border-color:var(--gold)}
  .txt-input::placeholder{color:var(--muted)}
  .lobby-box{max-width:420px;margin:0 auto;display:flex;flex-direction:column;gap:12px}
  .divider{text-align:center;color:var(--muted);font-size:.85rem;margin:4px 0}
  .waiting-player{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
  .players{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
  .pl{background:var(--panel);border:2px solid var(--line);border-radius:10px;padding:14px;transition:.2s}
  .pl.active-turn{border-color:var(--gold);box-shadow:0 0 16px rgba(232,184,75,.3)}
  .pl.dead{opacity:.35;filter:grayscale(1)}
  .pl.targetable{border-color:var(--red);cursor:pointer;box-shadow:0 0 14px rgba(214,84,63,.4)}
  .pl.targetable:hover{transform:translateY(-3px);box-shadow:0 0 22px rgba(214,84,63,.7)}
  .pl .nm{font-family:'Black Han Sans';font-size:1.3rem}
  .pl .you{color:var(--blue)}.pl .ai{color:var(--red)}
  .pl .char-tag{font-size:.75rem;color:var(--muted);margin:2px 0 8px}
  .hpbar{background:#000;border-radius:6px;height:22px;overflow:hidden;position:relative;border:1px solid var(--line)}
  .hpfill{height:100%;transition:width .4s}
  .hptext{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:bold;text-shadow:1px 1px 2px #000}
  .hand-label{font-family:'Black Han Sans';color:var(--gold);margin:10px 0 6px;font-size:1rem}
  .hand{display:flex;gap:8px;flex-wrap:wrap}
  .card{background:var(--panel-light);border:2px solid var(--line);border-radius:8px;padding:8px 10px;min-width:92px;cursor:pointer;transition:.15s;position:relative}
  .card:hover:not(.disabled){border-color:var(--gold);transform:translateY(-4px)}
  .card.disabled{opacity:.35;cursor:not-allowed}
  .card .cn{font-family:'Black Han Sans';font-size:.95rem}
  .card .ct{font-size:.7rem;color:var(--muted);margin-top:3px}
  .card .badge{position:absolute;top:-8px;right:-8px;background:var(--gold);color:#000;font-size:.62rem;padding:2px 5px;border-radius:10px;font-weight:bold}
  .tag-ATK{color:var(--red)}.tag-DEF{color:var(--blue)}.tag-HEAL{color:var(--green)}
  .tag-ALL{color:#d98ad9}.tag-REFLECT{color:#e8b84b}.tag-Bounce{color:#e89a4b}
  .log{background:#0e0a07;border:1px solid var(--line);border-radius:8px;padding:12px;height:150px;overflow-y:auto;font-size:.82rem;line-height:1.6;margin-top:14px}
  .log .l-sys{color:var(--muted)}.log .l-hit{color:var(--red)}.log .l-heal{color:var(--green)}
  .log .l-miss{color:var(--muted);font-style:italic}.log .l-block{color:var(--blue)}.log .l-ref{color:var(--gold)}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:50}
  .overlay.active{display:flex}
  .modal{background:var(--panel);border:2px solid var(--gold);border-radius:12px;padding:24px;max-width:440px;width:92%}
  .modal h2{color:var(--gold);font-size:1.4rem;margin-bottom:8px}
  .modal p{color:var(--ink);margin-bottom:16px;font-size:.95rem}
  .modal .react-cards{display:flex;flex-direction:column;gap:8px}
  .react-opt{background:var(--panel-light);border:1px solid var(--line);border-radius:8px;padding:12px;cursor:pointer;transition:.15s;text-align:left}
  .react-opt:hover{border-color:var(--gold)}
  .status{text-align:center;padding:10px;color:var(--gold);font-family:'Black Han Sans';font-size:1.05rem;min-height:1.5em}
  .center{text-align:center;margin-top:18px}
  .winner{text-align:center;padding:40px}
  .winner h2{font-size:2.6rem;color:var(--gold);text-shadow:2px 2px 0 #000}
  .mode-grid{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .mode-card{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:28px 32px;cursor:pointer;transition:.2s;text-align:center;min-width:180px}
  .mode-card:hover{border-color:var(--gold);transform:translateY(-4px)}
  .mode-card .mc-icon{font-size:2.4rem;margin-bottom:10px}
  .mode-card .mc-title{font-family:'Black Han Sans';font-size:1.3rem;color:var(--gold)}
  .mode-card .mc-desc{font-size:.82rem;color:var(--muted);margin-top:6px}
  .room-code-big{font-family:'Black Han Sans';font-size:3rem;color:var(--gold);letter-spacing:10px;text-align:center;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:16px;margin-bottom:8px;cursor:pointer}
  .room-code-big:hover{border-color:var(--gold)}
  .two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:560px){.two-col{grid-template-columns:1fr}.mode-grid{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>으리챗 난투전</h1>
    <p id="headerSub">프로토타입 v0.4</p>
  </header>

  <!-- 모드 선택 -->
  <section id="screen-start" class="screen active">
    <h2 style="text-align:center;color:var(--ink)">게임 모드를 선택하세요</h2>
    <div class="mode-grid">
      <div class="mode-card" onclick="startLocalMode()">
        <div class="mc-icon">🤖</div>
        <div class="mc-title">로컬 AI 대전</div>
        <div class="mc-desc">나 vs AI 3명<br>혼자서 바로 플레이</div>
      </div>
      <div class="mode-card" id="onlineModeCard" onclick="goOnline()">
        <div class="mc-icon">🌐</div>
        <div class="mc-title">온라인 멀티</div>
        <div class="mc-desc">방 코드로 친구 초대<br>2~4인 실시간 대전</div>
      </div>
    </div>
  </section>

  <!-- 온라인 로비 -->
  <section id="screen-online" class="screen">
    <h2 style="text-align:center;color:var(--ink);margin-bottom:20px">온라인 플레이</h2>
    <div class="lobby-box">
      <input id="playerNameInput" class="txt-input" placeholder="내 닉네임을 입력하세요" maxlength="10">
      <button class="btn" onclick="createRoom()">방 만들기</button>
      <div class="divider">— 또는 기존 방 입장 —</div>
      <input id="roomCodeInput" class="txt-input" placeholder="방 코드 4자리 (예: AB3K)" maxlength="4" style="text-transform:uppercase;letter-spacing:4px;text-align:center">
      <button class="btn secondary" onclick="joinRoom()">방 입장</button>
      <div class="center"><button class="btn secondary" onclick="showScreen('start')">← 뒤로</button></div>
      <div id="lobbyError" style="color:var(--red);text-align:center;font-size:.9rem;min-height:1.2em"></div>
    </div>
  </section>

  <!-- 대기실 -->
  <section id="screen-waiting" class="screen">
    <div style="text-align:center;margin-bottom:4px;font-size:.85rem;color:var(--muted)">방 코드 (클릭하면 복사)</div>
    <div id="roomCodeDisplay" class="room-code-big" onclick="copyRoomCode()">—</div>
    <div style="text-align:center;font-size:.78rem;color:var(--muted);margin-bottom:16px">친구에게 이 코드를 알려주세요</div>
    <div class="two-col">
      <div>
        <div class="hand-label">참가 중인 플레이어</div>
        <div id="waitingPlayerList"></div>
      </div>
      <div>
        <div class="hand-label">내 캐릭터 선택</div>
        <div id="onlineCharGrid" class="char-grid" style="grid-template-columns:1fr 1fr;margin:8px 0"></div>
      </div>
    </div>
    <div class="center">
      <button id="onlineStartBtn" class="btn" onclick="startOnlineGame()" style="display:none">게임 시작</button>
      <div id="waitingStatus" style="color:var(--muted);font-size:.9rem;margin-top:10px"></div>
    </div>
  </section>

  <!-- 로컬 캐릭터 선택 -->
  <section id="screen-select" class="screen">
    <h2 style="color:var(--ink);text-align:center">캐릭터를 선택하세요</h2>
    <div id="charGrid" class="char-grid"></div>
    <div class="center"><button id="startBtn" class="btn" disabled>게임 시작</button></div>
  </section>

  <!-- 전투 -->
  <section id="screen-battle" class="screen">
    <div class="status" id="statusBar">—</div>
    <div class="players" id="playersBox"></div>
    <div class="hand-label">내 손패 — 카드를 눌러 사용</div>
    <div class="hand" id="handBox"></div>
    <div class="center" style="margin-top:12px">
      <button id="passBtn" class="btn secondary">패스 (카드 1장 획득)</button>
    </div>
    <div class="log" id="logBox"></div>
  </section>

  <!-- 승리 -->
  <section id="screen-win" class="screen">
    <div class="winner">
      <h2 id="winText">승리!</h2>
      <p style="color:var(--muted);margin:16px 0 24px" id="winSub"></p>
      <button class="btn" onclick="location.reload()">다시 하기</button>
    </div>
  </section>
</div>

<!-- 피격 반응 모달 -->
<div class="overlay" id="reactOverlay">
  <div class="modal">
    <h2>공격받았다!</h2>
    <p id="reactDesc">—</p>
    <div class="react-cards" id="reactCards"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
/* =============================================================
   으리챗 난투전 v0.4 — 로컬 AI + 온라인 멀티 (Firebase)
   ============================================================= */

// ── FIREBASE CONFIG ──────────────────────────────────────────
// Firebase 콘솔(console.firebase.google.com) → 프로젝트 만들기
// → Realtime Database 생성(테스트 모드) → 웹앱 추가
// → 아래 값을 자신의 프로젝트 값으로 교체
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCJNIEKNrlBVHaw3msQDc9wl5jkPh1srAs",
  authDomain:        "loyalty-super-melee.firebaseapp.com",
  databaseURL:       "https://loyalty-super-melee-default-rtdb.firebaseio.com",
  projectId:         "loyalty-super-melee",
  storageBucket:     "loyalty-super-melee.firebasestorage.app",
  messagingSenderId: "752015537678",
  appId:             "1:752015537678:web:b8c02f26b7d5edb0e4ee5f"
};

const FB_READY = FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY";
let db = null;
if (FB_READY) {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();
}

// ── 카드 정의 ────────────────────────────────────────────────
const CARD_DEFS = {
  munchi:  { name:"뭉치 짖기",  type:"ALL",     value:10, prob:0.5, trigger:"최초", plusType:"ProbabilityUP", plusValue:0.25 },
  kalbang: { name:"칼빵",       type:"ATK",     value:5,  prob:1,   trigger:null,   plusType:null,            plusValue:0 },
  cook:    { name:"요리하기",   type:"HEAL",    value:5,  prob:1,   trigger:"종원", plusType:"ValueUP",       plusValue:2 },
  painkill:{ name:"진통제",     type:"DEF",     value:10, prob:1,   trigger:"기종", plusType:"ValueUP",       plusValue:5 },
  protein: { name:"프로틴",     type:"ATK",     value:5,  prob:1,   trigger:"현일", plusType:"HEAL",          plusValue:2 },
  mirror:  { name:"무지개 반사",type:"REFLECT", value:0,  prob:1,   trigger:null,   plusType:null,            plusValue:0 },
  bounce:  { name:"유수암쇄권", type:"Bounce",  value:0,  prob:1,   trigger:"기훈", plusType:"Target",        plusValue:2 },
};
const CARD_KEYS = Object.keys(CARD_DEFS);

// ── 캐릭터 정의 ──────────────────────────────────────────────
const CHARACTERS = [
  { id:"최초", desc:"뭉치 짖기 명중률 ↑" },
  { id:"종원", desc:"요리하기 회복량 ↑" },
  { id:"기종", desc:"진통제 방어량 ↑" },
  { id:"현일", desc:"프로틴 공격 시 회복" },
  { id:"기훈", desc:"유수암쇄권 대상 ↑" },
  { id:"규형", desc:"(트리거 미배치)" },
  { id:"지원", desc:"(트리거 미배치)" },
  { id:"소민", desc:"(트리거 미배치)" },
  { id:"준형", desc:"(트리거 미배치)" },
  { id:"종문", desc:"(트리거 미배치)" },
];

const TYPE_TIMING = { ATK:"MyTurn", ALL:"MyTurn", HEAL:"MyTurn", DEF:"OnHit", REFLECT:"OnHit", Bounce:"OnHit" };
const CONFIG = { startHp:80, handSize:5, maxHand:6 };
const AI_IDS  = ["ai1","ai2","ai3"];
const AI_NAMES = ["상대A","상대B","상대C"];

// ── 런타임 상태 ───────────────────────────────────────────────
let gameMode = 'local';
let state = null;
let selectedChar = null;
let pendingCardUse = null;
let isPlaying = false;   // 큐 재생 중이면 입력 잠금 (기획 12-4)

// 온라인 전용
let myUid = sessionStorage.getItem('euri_uid') || (() => {
  const id = 'u_' + Math.random().toString(36).substr(2,8);
  sessionStorage.setItem('euri_uid', id);
  return id;
})();
let myName = '';
let roomId  = null;
let isHost  = false;
let roomRef = null;
let prevLogLen = 0;

// ── 화면 전환 ────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

// ── 모드 선택 ────────────────────────────────────────────────
function startLocalMode() {
  gameMode = 'local';
  renderLocalCharSelect();
  showScreen('select');
}

function goOnline() {
  if (!FB_READY) {
    alert('Firebase 설정이 필요합니다.\nindex.html 상단의 FIREBASE_CONFIG 값을 채워주세요.');
    return;
  }
  document.getElementById('lobbyError').textContent = '';
  showScreen('online');
}

// ── 유틸 ─────────────────────────────────────────────────────
function drawCard() { return CARD_KEYS[Math.floor(Math.random() * CARD_KEYS.length)]; }
function newHand(n) { return Array.from({ length: n }, drawCard); }
function effProb(key, chr) {
  const d = CARD_DEFS[key]; let p = d.prob;
  if (d.trigger === chr && d.plusType === "ProbabilityUP") p += d.plusValue;
  return Math.min(1, p);
}
function effValue(key, chr) {
  const d = CARD_DEFS[key]; let v = d.value;
  if (d.trigger === chr && d.plusType === "ValueUP") v += d.plusValue;
  return v;
}
function rollHit(p) { return Math.random() < p; }
function toArr(v) { return v ? (Array.isArray(v) ? v : Object.values(v)) : []; }

// ── 로컬 캐릭터 선택 ──────────────────────────────────────────
function renderLocalCharSelect() {
  const grid = document.getElementById('charGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-card';
    div.innerHTML = `<div class="nm">${c.id}</div><div class="ef">${c.desc}</div>`;
    div.onclick = () => {
      selectedChar = c.id;
      document.querySelectorAll('#charGrid .char-card').forEach(e => e.classList.remove('sel'));
      div.classList.add('sel');
      document.getElementById('startBtn').disabled = false;
    };
    grid.appendChild(div);
  });
}
document.getElementById('startBtn').onclick = startLocalGame;

// ── 로컬 게임 시작 ────────────────────────────────────────────
function startLocalGame() {
  const aiChars = AI_IDS.map(() => {
    const pool = CHARACTERS.filter(c => c.id !== selectedChar);
    return pool[Math.floor(Math.random() * pool.length)].id;
  });
  const players = {
    you: { name:"나", characterId:selectedChar, hp:CONFIG.startHp, alive:true, hand:newHand(CONFIG.handSize) }
  };
  AI_IDS.forEach((id, i) => {
    players[id] = { name:AI_NAMES[i], characterId:aiChars[i], hp:CONFIG.startHp, alive:true, hand:newHand(CONFIG.handSize) };
  });
  state = { phase:"playing", turnOrder:["you",...AI_IDS], currentTurnIndex:0, pendingAction:null, players, log:[], winner:null };
  pendingCardUse = null;
  document.getElementById('logBox').innerHTML = '';
  showScreen('battle');
  pushLog(`게임 시작! 나(${selectedChar}) vs ${AI_IDS.map((id,i)=>`${AI_NAMES[i]}(${aiChars[i]})`).join(', ')}`, 'sys');
  beginTurn();
}

// ── 온라인: 방 만들기 ─────────────────────────────────────────
async function createRoom() {
  const name = document.getElementById('playerNameInput').value.trim();
  if (!name) { setLobbyError('닉네임을 입력하세요'); return; }
  myName = name;
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code;
  for (let t = 0; t < 20; t++) {
    code = Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join('');
    const snap = await db.ref('rooms/' + code).once('value');
    if (!snap.exists()) break;
  }
  roomId = code; isHost = true;
  await db.ref('rooms/' + roomId).set({
    host: myUid, phase:'waiting',
    players: { [myUid]: { name:myName, characterId:null } }
  });
  listenRoom();
  showScreen('waiting');
}

// ── 온라인: 방 입장 ───────────────────────────────────────────
async function joinRoom() {
  const name = document.getElementById('playerNameInput').value.trim();
  const code = document.getElementById('roomCodeInput').value.trim().toUpperCase();
  if (!name) { setLobbyError('닉네임을 입력하세요'); return; }
  if (code.length !== 4) { setLobbyError('방 코드 4자리를 입력하세요'); return; }
  myName = name;
  const snap = await db.ref('rooms/' + code).once('value');
  if (!snap.exists()) { setLobbyError('방을 찾을 수 없습니다'); return; }
  const data = snap.val();
  if (data.phase !== 'waiting') { setLobbyError('이미 게임이 시작된 방입니다'); return; }
  if (Object.keys(data.players || {}).length >= 4) { setLobbyError('방이 가득 찼습니다 (최대 4명)'); return; }
  roomId = code; isHost = data.host === myUid;
  await db.ref('rooms/' + roomId + '/players/' + myUid).set({ name:myName, characterId:null });
  listenRoom();
  showScreen('waiting');
}

function setLobbyError(msg) { document.getElementById('lobbyError').textContent = msg; }

// ── Firebase 리스너 ───────────────────────────────────────────
function listenRoom() {
  if (roomRef) roomRef.off();
  roomRef = db.ref('rooms/' + roomId);
  roomRef.on('value', snap => {
    const data = snap.val();
    if (!data) return;
    if (data.phase === 'waiting') renderWaitingRoom(data);
    else handleOnlineState(data);
  });
}

// ── 대기실 렌더링 ─────────────────────────────────────────────
function renderWaitingRoom(data) {
  document.getElementById('roomCodeDisplay').textContent = roomId;
  isHost = data.host === myUid;

  const list = document.getElementById('waitingPlayerList');
  list.innerHTML = '';
  Object.entries(data.players || {}).forEach(([uid, p]) => {
    const div = document.createElement('div');
    div.className = 'waiting-player';
    const me = uid === myUid;
    div.innerHTML = `<span style="color:${me?'var(--blue)':'var(--ink)'}">${p.name}${uid===data.host?' 👑':''}</span><span style="color:var(--muted);font-size:.8rem">${p.characterId||'선택 중...'}</span>`;
    list.appendChild(div);
  });

  const myChar = data.players[myUid]?.characterId;
  const grid = document.getElementById('onlineCharGrid');
  grid.innerHTML = '';
  CHARACTERS.forEach(c => {
    const div = document.createElement('div');
    div.className = 'char-card' + (c.id === myChar ? ' sel' : '');
    div.innerHTML = `<div class="nm">${c.id}</div><div class="ef">${c.desc}</div>`;
    div.onclick = () => db.ref('rooms/'+roomId+'/players/'+myUid+'/characterId').set(c.id);
    grid.appendChild(div);
  });

  const count = Object.keys(data.players||{}).length;
  const allPicked = Object.values(data.players||{}).every(p => p.characterId);
  const btn = document.getElementById('onlineStartBtn');
  const st  = document.getElementById('waitingStatus');
  if (isHost) {
    btn.style.display = 'block';
    if (count < 2)       { btn.disabled = true;  btn.textContent = `게임 시작 (최소 2명 필요)`; }
    else if (!allPicked) { btn.disabled = true;  btn.textContent = `모두 캐릭터 선택 후 시작`; }
    else                 { btn.disabled = false; btn.textContent = `게임 시작 (${count}명)`; }
    st.textContent = '';
  } else {
    btn.style.display = 'none';
    st.textContent = allPicked ? '방장이 게임을 시작할 때까지 대기 중...' : '캐릭터를 선택하세요';
  }
}

function copyRoomCode() {
  navigator.clipboard?.writeText(roomId).then(() => {
    const el = document.getElementById('roomCodeDisplay');
    const orig = el.textContent;
    el.textContent = '복사됨!';
    setTimeout(() => { el.textContent = orig; }, 1200);
  });
}

// ── 온라인 게임 시작 ──────────────────────────────────────────
async function startOnlineGame() {
  const snap = await db.ref('rooms/'+roomId).once('value');
  const data = snap.val();
  const entries = Object.entries(data.players||{});
  if (entries.length < 2) { alert('최소 2명 필요'); return; }
  if (!entries.every(([,p])=>p.characterId)) { alert('모든 플레이어가 캐릭터를 선택해야 합니다'); return; }

  const turnOrder = entries.map(([uid])=>uid);
  for (let i = turnOrder.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [turnOrder[i],turnOrder[j]] = [turnOrder[j],turnOrder[i]];
  }
  const players = {};
  entries.forEach(([uid,p]) => {
    players[uid] = { name:p.name, characterId:p.characterId, hp:CONFIG.startHp, alive:true, hand:newHand(CONFIG.handSize) };
  });
  const logObj = { 0:`게임 시작! 순서: ${turnOrder.map(u=>players[u].name).join(' → ')}` };
  await db.ref('rooms/'+roomId).update({
    phase:'playing', players, turnOrder, currentTurnIndex:0,
    pendingAction:null, log:logObj, winner:null
  });
}

// ── 온라인 상태 수신 ──────────────────────────────────────────
function handleOnlineState(data) {
  const logArr = toArr(data.log);
  const newLogs = logArr.slice(prevLogLen);
  prevLogLen = logArr.length;

  state = {
    phase: data.phase,
    players: data.players || {},
    turnOrder: toArr(data.turnOrder),
    currentTurnIndex: data.currentTurnIndex || 0,
    pendingAction: data.pendingAction || null,
    log: logArr,
    winner: data.winner || null,
  };
  // 각 플레이어 손패 배열 정규화
  Object.values(state.players).forEach(p => { p.hand = toArr(p.hand); });

  if (data.phase === 'finished') { showWin(); return; }

  if (!document.getElementById('screen-battle').classList.contains('active')) {
    document.getElementById('logBox').innerHTML = '';
    showScreen('battle');
  }

  newLogs.forEach(msg => appendLog(msg, classifyLog(msg)));
  render();

  const curId = state.turnOrder[state.currentTurnIndex];

  // 내가 타겟인 pendingAction
  if (state.pendingAction && state.pendingAction.target === myUid) {
    const reactions = getReactionCards(myUid);
    openReactModal(state.pendingAction.attacker, myUid, state.pendingAction.item, state.pendingAction.damage, reactions);
    return;
  }

  if (state.pendingAction) {
    setStatus(`${state.players[state.pendingAction.target]?.name||'?'}의 반응을 기다리는 중...`);
    return;
  }

  if (curId === myUid) {
    setStatus('내 턴 — 카드를 사용하거나 패스하세요');
  } else {
    setStatus(`${state.players[curId]?.name||'?'}의 턴...`);
  }
}

function classifyLog(msg) {
  if (msg.includes('탈락')) return 'sys';
  if (msg.includes('피해'))  return 'hit';
  if (msg.includes('회복'))  return 'heal';
  if (msg.includes('방어'))  return 'block';
  if (msg.includes('반사') || msg.includes('떠넘김')) return 'ref';
  if (msg.includes('빗나감')) return 'miss';
  return 'sys';
}

// ── Firebase 동기화 ───────────────────────────────────────────
async function syncOnline() {
  const logObj = {};
  state.log.forEach((v,i) => { logObj[i] = v; });
  await db.ref('rooms/'+roomId).update({
    phase: state.phase,
    players: state.players,
    turnOrder: state.turnOrder,
    currentTurnIndex: state.currentTurnIndex,
    pendingAction: state.pendingAction,
    log: logObj,
    winner: state.winner || null,
  });
}

async function onlineNextTurn() {
  let idx = (state.currentTurnIndex + 1) % state.turnOrder.length;
  for (let t = 0; t < state.turnOrder.length; t++) {
    if (state.players[state.turnOrder[idx]].alive) break;
    idx = (idx + 1) % state.turnOrder.length;
  }
  state.currentTurnIndex = idx;
  await syncOnline();
}

// ── 승리 화면 ────────────────────────────────────────────────
function showWin() {
  const meId = gameMode === 'online' ? myUid : 'you';
  const won  = state.winner === meId;
  const winnerName = state.winner ? (state.players[state.winner]?.name||'?') : '없음';
  document.getElementById('winText').textContent = won ? '승리!' : `${winnerName} 우승!`;
  document.getElementById('winText').style.color  = won ? 'var(--gold)' : 'var(--red)';
  document.getElementById('winSub').textContent   = won ? '마지막까지 살아남았다!' : '다음엔 더 잘 싸워보자.';
  showScreen('win');
}

// ── 턴 시작 ──────────────────────────────────────────────────
function beginTurn() {
  if (checkWin()) return;
  const cur = state.turnOrder[state.currentTurnIndex];
  if (!state.players[cur].alive) { nextTurn(); return; }
  const p = state.players[cur];
  pendingCardUse = null;
  render();
  const myId = gameMode === 'online' ? myUid : 'you';
  if (cur === myId) {
    setStatus('내 턴 — 카드를 사용하거나 패스하세요');
  } else {
    setStatus(`${p.name}의 턴…`);
    if (gameMode === 'local') setTimeout(aiTurn, 900);
  }
}

function nextTurn() {
  state.currentTurnIndex = (state.currentTurnIndex + 1) % state.turnOrder.length;
  beginTurn();
}

// ── 카드 사용 ────────────────────────────────────────────────
function myPlayerId() { return gameMode === 'online' ? myUid : 'you'; }

function useCard(handIdx) {
  if (isPlaying) return;
  const myId = myPlayerId();
  if (state.turnOrder[state.currentTurnIndex] !== myId) return;
  if (pendingCardUse) return;
  const me = state.players[myId];
  const key = me.hand[handIdx];
  const def = CARD_DEFS[key];
  if (TYPE_TIMING[def.type] !== 'MyTurn') { setStatus('이 카드는 공격받았을 때만 쓸 수 있어요'); return; }
  if (def.type === 'ATK') {
    pendingCardUse = { handIdx, key };
    setStatus('⚔ 공격할 상대를 클릭하세요  [취소: 패스 버튼]');
    render(); return;
  }
  me.hand.splice(handIdx, 1);
  me.hand.push(drawCard());
  resolveMyTurnCard(myId, null, key);
}

function selectTarget(targetId) {
  if (isPlaying) return;
  if (!pendingCardUse) return;
  const myId = myPlayerId();
  if (targetId === myId || !state.players[targetId].alive) return;
  const { handIdx, key } = pendingCardUse;
  pendingCardUse = null;
  state.players[myId].hand.splice(handIdx, 1);
  state.players[myId].hand.push(drawCard());
  resolveMyTurnCard(myId, targetId, key);
}

function cancelTargeting() {
  pendingCardUse = null;
  render();
  setStatus('내 턴 — 카드를 사용하거나 패스하세요');
}

document.getElementById('passBtn').onclick = () => {
  if (isPlaying) return;
  const myId = myPlayerId();
  if (!state || state.turnOrder[state.currentTurnIndex] !== myId) return;
  if (pendingCardUse) { cancelTargeting(); return; }
  state.players[myId].hand.push(drawCard());
  pushLog(`${state.players[myId].name}은 패스했다. (카드 1장 획득)`, 'sys');
  render();
  if (gameMode === 'online') syncOnline().then(() => onlineNextTurn());
  else setTimeout(nextTurn, 500);
};

// ── MyTurn 카드 처리 ─────────────────────────────────────────
function resolveMyTurnCard(attackerId, targetId, key) {
  const def = CARD_DEFS[key];
  const atkChar = state.players[attackerId].characterId;

  if (def.type === 'HEAL') {
    const heal = effValue(key, atkChar);
    state.players[attackerId].hp = Math.min(CONFIG.startHp, state.players[attackerId].hp + heal);
    pushLog(`${state.players[attackerId].name}: ${def.name}으로 HP ${heal} 회복`, 'heal');
    render();
    if (gameMode === 'online') { if (!checkWinOnline()) syncOnline().then(() => onlineNextTurn()); }
    else finishAction(attackerId);
    return;
  }

  if (def.type === 'ALL') {
    const targets = state.turnOrder.filter(id => id !== attackerId && state.players[id].alive);
    const prob = effProb(key, atkChar);
    targets.forEach(tid => {
      if (rollHit(prob)) applyDamage(tid, def.value, attackerId, def.name);
      else pushLog(`${def.name} → ${state.players[tid].name} 빗나감!`, 'miss');
    });
    render();
    if (gameMode === 'online') { if (!checkWinOnline()) syncOnline().then(() => onlineNextTurn()); }
    else finishAction(attackerId);
    return;
  }

  if (def.type === 'ATK') {
    if (gameMode === 'online') {
      // 온라인: 기존 pendingAction 경로 유지 (12장 큐는 로컬만)
      const prob = effProb(key, atkChar);
      if (def.trigger === atkChar && def.plusType === 'HEAL') {
        state.players[attackerId].hp = Math.min(CONFIG.startHp, state.players[attackerId].hp + def.plusValue);
        pushLog(`${state.players[attackerId].name}: ${def.name} 효과로 HP ${def.plusValue} 회복`, 'heal');
      }
      if (!rollHit(prob)) {
        pushLog(`${state.players[attackerId].name}의 ${def.name} → 빗나감!`, 'miss');
        render();
        syncOnline().then(() => onlineNextTurn());
        return;
      }
      state.pendingAction = { attacker:attackerId, target:targetId, item:key, damage:def.value, type:'single' };
      pushLog(`${state.players[attackerId].name} → ${state.players[targetId].name}에게 ${def.name} 공격!`, 'sys');
      render();
      syncOnline();
      return;
    }
    // 로컬: 이벤트 큐 생성 후 재생 (기획 12-1)
    const q = buildAtkQueue(attackerId, targetId, key);
    playQueue(q, () => { if (!checkWin()) setTimeout(nextTurn, 400); });
    return;
  }
}

// ── 피격 반응 ────────────────────────────────────────────────
function getReactionCards(playerId) {
  return toArr(state.players[playerId].hand)
    .map((k,i) => ({k,i}))
    .filter(o => TYPE_TIMING[CARD_DEFS[o.k]?.type] === 'OnHit');
}

function offerReaction(attackerId, targetId, atkKey, dmg) {
  const reactions = getReactionCards(targetId);
  if (targetId === 'you') {
    openReactModal(attackerId, targetId, atkKey, dmg, reactions);
  } else {
    let choice = 'take';
    if (reactions.length > 0 && Math.random() < 0.5)
      choice = reactions[Math.floor(Math.random() * reactions.length)];
    applyReaction(attackerId, targetId, atkKey, dmg, choice);
  }
}

function openReactModal(attackerId, targetId, atkKey, dmg, reactions) {
  document.getElementById('reactDesc').textContent =
    `${state.players[attackerId].name}의 ${CARD_DEFS[atkKey].name} — ${dmg} 데미지가 들어옵니다!`;
  const box = document.getElementById('reactCards');
  box.innerHTML = '';

  const takeBtn = document.createElement('div');
  takeBtn.className = 'react-opt';
  takeBtn.innerHTML = `<b>그냥 맞기</b> — HP ${dmg} 감소`;
  takeBtn.onclick = () => { closeReactModal(); applyReaction(attackerId, targetId, atkKey, dmg, 'take'); };
  box.appendChild(takeBtn);

  reactions.forEach(o => {
    const d = CARD_DEFS[o.k];
    const tChar = state.players[targetId].characterId;
    const btn = document.createElement('div');
    btn.className = 'react-opt';
    let label = `<b>${d.name}</b> (${d.type}) — `;
    if (d.type === 'DEF')     label += `데미지 ${effValue(o.k,tChar)} 경감`;
    if (d.type === 'REFLECT') label += `공격자에게 그대로 반사`;
    if (d.type === 'Bounce')  label += `랜덤 대상에게 떠넘김`;
    btn.innerHTML = label;
    btn.onclick = () => { closeReactModal(); applyReaction(attackerId, targetId, atkKey, dmg, o); };
    box.appendChild(btn);
  });

  document.getElementById('reactOverlay').classList.add('active');
}
function closeReactModal() { document.getElementById('reactOverlay').classList.remove('active'); }

function applyReaction(attackerId, targetId, atkKey, dmg, choice) {
  const tName = state.players[targetId].name;

  const afterReaction = () => {
    state.pendingAction = null;
    render();
    if (gameMode === 'online') { if (!checkWinOnline()) syncOnline().then(() => onlineNextTurn()); }
    else finishAction(attackerId);
  };

  if (choice === 'take') {
    applyDamage(targetId, dmg, attackerId, CARD_DEFS[atkKey].name);
    afterReaction(); return;
  }

  const tHand = state.players[targetId].hand;
  const idx = tHand.indexOf(choice.k);
  if (idx >= 0) { tHand.splice(idx,1); tHand.push(drawCard()); }
  const rDef = CARD_DEFS[choice.k];
  const tChar = state.players[targetId].characterId;

  if (rDef.type === 'DEF') {
    const reduce = effValue(choice.k, tChar);
    const final  = Math.max(0, dmg - reduce);
    pushLog(`${tName}: ${rDef.name}으로 방어 (−${reduce}) → ${final} 피해`, 'block');
    if (final > 0) applyDamage(targetId, final, attackerId, '관통');
    afterReaction(); return;
  }
  if (rDef.type === 'REFLECT') {
    pushLog(`${tName}: ${rDef.name}! 공격자에게 ${dmg} 반사`, 'ref');
    applyDamage(attackerId, dmg, targetId, '반사');
    afterReaction(); return;
  }
  if (rDef.type === 'Bounce') {
    let nT = 1;
    if (rDef.trigger === tChar && rDef.plusType === 'Target') nT += rDef.plusValue;
    const alive = state.turnOrder.filter(id => state.players[id].alive);
    pushLog(`${tName}: ${rDef.name}! ${dmg} 데미지를 랜덤 ${nT}명에게 떠넘김`, 'ref');
    for (let n = 0; n < nT; n++) applyDamage(alive[Math.floor(Math.random()*alive.length)], dmg, targetId, '떠넘김');
    afterReaction(); return;
  }
}

// ── 데미지 적용 ───────────────────────────────────────────────
function applyDamage(targetId, dmg, sourceId, label) {
  const p = state.players[targetId];
  if (!p.alive) return;
  p.hp -= dmg;
  pushLog(`${p.name} ${label}으로 ${dmg} 피해 (HP ${Math.max(0,p.hp)})`, 'hit');
  if (p.hp <= 0) { p.hp = 0; p.alive = false; pushLog(`💀 ${p.name} 탈락!`, 'sys'); }
}

// ── 이벤트 큐 + 재생기 (기획 12장) ────────────────────────────
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// 단일 ATK 한 건 → 이벤트 배열 (계산만, 실제 적용은 재생기에서 박자별로)
function buildAtkQueue(attackerId, targetId, key) {
  const def = CARD_DEFS[key];
  const atkChar = state.players[attackerId].characterId;
  const q = [];
  // 프로틴 등: 공격 시 자기 회복 (명중 여부와 무관)
  if (def.trigger === atkChar && def.plusType === 'HEAL')
    q.push({ kind:'selfheal', target:attackerId, amount:def.plusValue, card:key });
  q.push({ kind:'announce', actor:attackerId, target:targetId, card:key });
  const hit = rollHit(effProb(key, atkChar));
  q.push({ kind:'hitcheck', target:targetId, card:key, hit });
  if (hit) q.push({ kind:'askDefense', attacker:attackerId, target:targetId, item:key, incoming:def.value });
  return q;
}

// 피격자 응답 → 후속 이벤트(연출+데미지). 반응 카드 소모는 이 시점에 처리.
function buildReactionEvents(attackerId, targetId, atkKey, dmg, choice) {
  const evs = [];
  const tName = state.players[targetId].name;
  if (choice === 'take') {
    evs.push({ kind:'react', text:`${tName}, 그냥 맞기`, log:`${tName} 그냥 맞기`, logKind:'sys' });
    evs.push({ kind:'damage', target:targetId, amount:dmg, label:CARD_DEFS[atkKey].name });
    return evs;
  }
  const tHand = state.players[targetId].hand;
  const idx = tHand.indexOf(choice.k);
  if (idx >= 0) { tHand.splice(idx, 1); tHand.push(drawCard()); }
  const rDef = CARD_DEFS[choice.k];
  const tChar = state.players[targetId].characterId;
  if (rDef.type === 'DEF') {
    const reduce = effValue(choice.k, tChar);
    const final = Math.max(0, dmg - reduce);
    evs.push({ kind:'react', text:`🛡 ${tName} 막음! (−${reduce})`, log:`${tName}: ${rDef.name}으로 방어 (−${reduce}) → ${final} 피해`, logKind:'block' });
    if (final > 0) evs.push({ kind:'damage', target:targetId, amount:final, label:'관통' });
  } else if (rDef.type === 'REFLECT') {
    evs.push({ kind:'react', text:`🔄 ${tName} 반사!`, log:`${tName}: ${rDef.name}! 공격자에게 ${dmg} 반사`, logKind:'ref' });
    evs.push({ kind:'damage', target:attackerId, amount:dmg, label:'반사' });
  } else if (rDef.type === 'Bounce') {
    let nT = 1;
    if (rDef.trigger === tChar && rDef.plusType === 'Target') nT += rDef.plusValue;
    const alive = state.turnOrder.filter(id => state.players[id].alive);
    evs.push({ kind:'react', text:`💥 ${tName} 떠넘김! (${nT}명)`, log:`${tName}: ${rDef.name}! ${dmg} 데미지를 랜덤 ${nT}명에게 떠넘김`, logKind:'ref' });
    for (let n = 0; n < nT; n++) {
      const victim = alive[Math.floor(Math.random() * alive.length)];
      evs.push({ kind:'damage', target:victim, amount:dmg, label:'떠넘김' });
    }
  }
  return evs;
}

// 피격자에게 방어/반사/바운스/맞기 입력 요청 → choice 반환 (Promise)
function askDefense(attackerId, targetId, atkKey, dmg) {
  return new Promise(resolve => {
    const reactions = getReactionCards(targetId);
    if (targetId === myPlayerId()) {
      openDefenseModal(attackerId, targetId, atkKey, dmg, reactions, resolve);
    } else {
      let choice = 'take';
      if (reactions.length > 0 && Math.random() < 0.5)
        choice = reactions[Math.floor(Math.random() * reactions.length)];
      setTimeout(() => resolve(choice), 500);
    }
  });
}

// 큐 전용 방어 모달 (선택 결과를 resolve로 넘김. 온라인용 openReactModal과 별개)
function openDefenseModal(attackerId, targetId, atkKey, dmg, reactions, resolve) {
  document.getElementById('reactDesc').textContent =
    `${state.players[attackerId].name}의 ${CARD_DEFS[atkKey].name} — ${dmg} 데미지가 들어옵니다!`;
  const box = document.getElementById('reactCards');
  box.innerHTML = '';
  const pick = (choice) => { closeReactModal(); resolve(choice); };

  const takeBtn = document.createElement('div');
  takeBtn.className = 'react-opt';
  takeBtn.innerHTML = `<b>그냥 맞기</b> — HP ${dmg} 감소`;
  takeBtn.onclick = () => pick('take');
  box.appendChild(takeBtn);

  reactions.forEach(o => {
    const d = CARD_DEFS[o.k];
    const tChar = state.players[targetId].characterId;
    const btn = document.createElement('div');
    btn.className = 'react-opt';
    let label = `<b>${d.name}</b> (${d.type}) — `;
    if (d.type === 'DEF')     label += `데미지 ${effValue(o.k, tChar)} 경감`;
    if (d.type === 'REFLECT') label += `공격자에게 그대로 반사`;
    if (d.type === 'Bounce')  label += `랜덤 대상에게 떠넘김`;
    btn.innerHTML = label;
    btn.onclick = () => pick(o);
    box.appendChild(btn);
  });

  document.getElementById('reactOverlay').classList.add('active');
}

// 재생기: 큐를 한 박자씩 소비. askDefense에서 멈춰 입력받고 후속 이벤트를 큐에 이어붙임.
async function playQueue(q, onDone) {
  isPlaying = true;
  render();
  for (let i = 0; i < q.length; i++) {
    const ev = q[i];
    if (ev.kind === 'selfheal') {
      const p = state.players[ev.target];
      p.hp = Math.min(CONFIG.startHp, p.hp + ev.amount);
      pushLog(`${p.name}: ${CARD_DEFS[ev.card].name} 효과로 HP ${ev.amount} 회복`, 'heal');
      render(); await sleep(700);
    } else if (ev.kind === 'announce') {
      const a = state.players[ev.actor], t = state.players[ev.target];
      setStatus(`⚔ ${a.name} → ${t.name} : ${CARD_DEFS[ev.card].name}!`);
      pushLog(`${a.name} → ${t.name}에게 ${CARD_DEFS[ev.card].name} 공격!`, 'sys');
      render(); await sleep(900);
    } else if (ev.kind === 'hitcheck') {
      if (!ev.hit) {
        setStatus('빗나감!');
        pushLog(`${CARD_DEFS[ev.card].name} → ${state.players[ev.target].name} 빗나감!`, 'miss');
        render(); await sleep(800);
      }
    } else if (ev.kind === 'askDefense') {
      setStatus(`${state.players[ev.target].name}의 응답을 기다리는 중...`);
      const choice = await askDefense(ev.attacker, ev.target, ev.item, ev.incoming);
      const reactEvents = buildReactionEvents(ev.attacker, ev.target, ev.item, ev.incoming, choice);
      q.splice(i + 1, 0, ...reactEvents);
    } else if (ev.kind === 'react') {
      setStatus(ev.text);
      pushLog(ev.log, ev.logKind);
      render(); await sleep(800);
    } else if (ev.kind === 'damage') {
      applyDamage(ev.target, ev.amount, null, ev.label);
      render(); await sleep(800);
    }
  }
  isPlaying = false;
  render();
  if (onDone) onDone();
}

// ── 행동 종료 (로컬) ──────────────────────────────────────────
function finishAction(actorId) {
  render();
  if (checkWin()) return;
  setTimeout(nextTurn, 700);
}

// ── AI 턴 ─────────────────────────────────────────────────────
function aiTurn() {
  const curId = state.turnOrder[state.currentTurnIndex];
  const ai = state.players[curId];
  if (!ai.alive) { nextTurn(); return; }

  const playable = ai.hand.map((k,i)=>({k,i})).filter(o=>TYPE_TIMING[CARD_DEFS[o.k].type]==='MyTurn');
  if (playable.length === 0) {
    ai.hand.push(drawCard());
    pushLog(`${ai.name}은 패스했다. (카드 1장 획득)`, 'sys');
    render(); setTimeout(nextTurn, 500); return;
  }

  const pick = playable[Math.floor(Math.random()*playable.length)];
  ai.hand.splice(ai.hand.indexOf(pick.k), 1);
  ai.hand.push(drawCard());

  const def = CARD_DEFS[pick.k];
  let targetId = null;
  if (def.type === 'ATK') {
    const cands = state.turnOrder.filter(id => id !== curId && state.players[id].alive);
    targetId = cands[Math.floor(Math.random()*cands.length)];
    // 공격 로그는 큐의 announce 박자에서 찍는다 (로컬 ATK)
  }
  resolveMyTurnCard(curId, targetId, pick.k);
}

// ── 승리 체크 ────────────────────────────────────────────────
function checkWin() {
  const alive = state.turnOrder.filter(id => state.players[id].alive);
  if (alive.length <= 1) {
    state.phase = 'finished'; state.winner = alive[0] || null;
    showWin(); return true;
  }
  return false;
}
function checkWinOnline() {
  const alive = state.turnOrder.filter(id => state.players[id].alive);
  if (alive.length <= 1) {
    state.phase = 'finished'; state.winner = alive[0] || null;
    syncOnline(); showWin(); return true;
  }
  return false;
}

// ── 렌더링 ───────────────────────────────────────────────────
function render() {
  if (!state) return;
  const box  = document.getElementById('playersBox');
  box.innerHTML = '';
  const myId     = myPlayerId();
  const curId    = state.turnOrder[state.currentTurnIndex];
  const targeting = !!pendingCardUse;

  state.turnOrder.forEach(id => {
    const p = state.players[id];
    if (!p) return;
    const isTargetable = targeting && id !== myId && p.alive;
    let cls = 'pl';
    if (id === curId && p.alive) cls += ' active-turn';
    if (!p.alive) cls += ' dead';
    if (isTargetable) cls += ' targetable';
    const div = document.createElement('div');
    div.className = cls;
    const nameCls = id === myId ? 'you' : 'ai';
    const hpPct = Math.max(0, p.hp / CONFIG.startHp * 100);
    const hpCol = hpPct > 50 ? 'var(--green)' : hpPct > 25 ? 'var(--gold)' : 'var(--red)';
    div.innerHTML = `
      <div class="nm ${nameCls}">${p.name}${id===curId&&p.alive?' ◀':''}</div>
      <div class="char-tag">${p.characterId}${isTargetable?' 👆 클릭하여 타겟':''}</div>
      <div class="hpbar"><div class="hpfill" style="width:${hpPct}%;background:linear-gradient(90deg,${hpCol},${hpCol}aa)"></div>
        <div class="hptext">${Math.max(0,p.hp)} / ${CONFIG.startHp}</div></div>
      <div class="char-tag" style="margin-top:6px">손패 ${toArr(p.hand).length}장</div>`;
    if (isTargetable) div.onclick = () => selectTarget(id);
    box.appendChild(div);
  });
  renderHand();
}

function renderHand() {
  const box  = document.getElementById('handBox');
  box.innerHTML = '';
  const myId = myPlayerId();
  const me   = state.players[myId];
  if (!me) return;
  const myTurn   = state.turnOrder[state.currentTurnIndex] === myId;
  const targeting = !!pendingCardUse;

  toArr(me.hand).forEach((k, i) => {
    const d = CARD_DEFS[k]; if (!d) return;
    const isMyTurnCard = TYPE_TIMING[d.type] === 'MyTurn';
    const usable  = myTurn && isMyTurnCard && !targeting && !isPlaying;
    const pending = targeting && pendingCardUse.handIdx === i;
    const div = document.createElement('div');
    div.className = 'card' + (usable||pending?'':' disabled') + (pending?' active-turn':'');
    let val = d.type==='HEAL'?`회복 ${d.value}`:d.type==='DEF'?`방어 ${d.value}`:d.type==='REFLECT'?'반사':d.type==='Bounce'?'떠넘김':`데미지 ${d.value}`;
    const prob = d.prob<1?` · 명중 ${Math.round(d.prob*100)}%`:'';
    const badge = d.trigger===me.characterId?`<div class="badge">전용</div>`:'';
    div.innerHTML = `${badge}<div class="cn tag-${d.type}">${d.name}</div><div class="ct">${d.type} · ${val}${prob}</div><div class="ct" style="color:var(--muted)">${isMyTurnCard?'내 턴':'피격 시'}</div>`;
    if (usable) div.onclick = () => useCard(i);
    box.appendChild(div);
  });
}

function setStatus(t) { document.getElementById('statusBar').textContent = t; }

function pushLog(msg, kind) {
  if (!state) return;
  state.log.push(msg);
  appendLog(msg, kind);
}
function appendLog(msg, kind) {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'l-' + (kind||'sys');
  line.textContent = '▸ ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

// ── 초기화 ───────────────────────────────────────────────────
if (!FB_READY) {
  document.getElementById('onlineModeCard').style.opacity = '0.5';
  document.getElementById('onlineModeCard').title = 'Firebase 설정 필요';
}
renderLocalCharSelect();
</script>
